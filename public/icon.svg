<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1114"/>
      <stop offset="100%" stop-color="#08090b"/>
    </linearGradient>
    <linearGradient id="ibodyG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#e8d48a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="iheadG" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8d48a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="ihelixG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#e8d48a" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="iambG" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.1"/>
      <stop offset="70%" stop-color="#c9a84c" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <filter id="iglow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="isoft">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background with subtle gradient -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgG)"/>

  <!-- Ambient glow -->
  <circle cx="512" cy="490" r="320" fill="url(#iambG)"/>

  <!-- Symbol group centered -->
  <g transform="translate(512, 490) scale(1.15)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="172" fill="none" stroke="rgba(201,168,76,0.06)" stroke-width="0.8" stroke-dasharray="2 6"/>
    <!-- Data dots -->
    <circle cx="0" cy="-172" r="2" fill="#c9a84c" opacity="0.35"/>
    <circle cx="86" cy="-149" r="2" fill="#c9a84c" opacity="0.35"/>
    <circle cx="149" cy="-86" r="2" fill="#c9a84c" opacity="0.35"/>
    <circle cx="172" cy="0" r="2" fill="#c9a84c" opacity="0.35"/>
    <circle cx="149" cy="86" r="2" fill="#c9a84c" opacity="0.35"/>
    <circle cx="86" cy="149" r="2" fill="#c9a84c" opacity="0.35"/>
    <circle cx="0" cy="172" r="2" fill="#c9a84c" opacity="0.35"/>
    <circle cx="-86" cy="149" r="2" fill="#c9a84c" opacity="0.35"/>
    <circle cx="-149" cy="86" r="2" fill="#c9a84c" opacity="0.35"/>
    <circle cx="-172" cy="0" r="2" fill="#c9a84c" opacity="0.35"/>
    <circle cx="-149" cy="-86" r="2" fill="#c9a84c" opacity="0.35"/>
    <circle cx="-86" cy="-149" r="2" fill="#c9a84c" opacity="0.35"/>

    <!-- Inner glow -->
    <circle cx="0" cy="0" r="105" fill="url(#iambG)"/>

    <!-- Ouroboros serpent -->
    <path
      d="M -15 -128 C 40 -135, 110 -100, 118 -35 C 126 30, 90 110, 20 125 C -50 140, -128 105, -132 35 C -136 -35, -100 -100, -52 -120"
      fill="none" stroke="url(#ibodyG)" stroke-width="8" stroke-linecap="round"
      stroke-dasharray="4 0 16 0 32 0 16 0 4"
      filter="url(#iglow)"
    />
    <path
      d="M -15 -128 C 40 -135, 110 -100, 118 -35 C 126 30, 90 110, 20 125 C -50 140, -128 105, -132 35 C -136 -35, -100 -100, -52 -120"
      fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="12"
      stroke-linecap="butt" stroke-dasharray="1 14"
    />
    <!-- Head -->
    <path
      d="M -26 -127 C -23 -136, -16 -142, -8 -139 L -10 -133 L -10 -123 L -8 -117 C -16 -114, -23 -118, -26 -127 Z"
      fill="url(#iheadG)" filter="url(#iglow)"
    />
    <!-- Eye -->
    <circle cx="-16" cy="-131" r="3.2" fill="#e8d48a" opacity="0.95" filter="url(#isoft)"/>
    <circle cx="-16.5" cy="-131" r="1.3" fill="rgba(15,17,20,0.7)"/>
    <!-- Tail -->
    <circle cx="-52" cy="-120" r="2" fill="#c9a84c" opacity="0.3"/>

    <!-- DNA Double Helix -->
    <g filter="url(#isoft)">
      <path d="M 22 -82 C 22 -54, -22 -54, -22 -26 S 22 2, 22 30 S -22 58, -22 86"
        stroke="url(#ihelixG)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M -22 -82 C -22 -54, 22 -54, 22 -26 S -22 2, -22 30 S 22 58, 22 86"
        stroke="url(#ihelixG)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <line x1="-8" y1="-68" x2="8" y2="-68" stroke="#c9a84c" stroke-width="1.2" opacity="0.25"/>
      <line x1="-20" y1="-40" x2="20" y2="-40" stroke="#c9a84c" stroke-width="1.2" opacity="0.35"/>
      <line x1="-20" y1="44" x2="20" y2="44" stroke="#c9a84c" stroke-width="1.2" opacity="0.35"/>
      <line x1="-8" y1="72" x2="8" y2="72" stroke="#c9a84c" stroke-width="1.2" opacity="0.25"/>
      <circle cx="-20" cy="-40" r="2" fill="#c9a84c" opacity="0.4"/>
      <circle cx="20" cy="-40" r="2" fill="#c9a84c" opacity="0.4"/>
      <circle cx="20" cy="44" r="2" fill="#c9a84c" opacity="0.4"/>
      <circle cx="-20" cy="44" r="2" fill="#c9a84c" opacity="0.4"/>
      <circle cx="0" cy="-54" r="2" fill="#e8d48a" opacity="0.45"/>
      <circle cx="0" cy="2" r="2" fill="#e8d48a" opacity="0.45"/>
      <circle cx="0" cy="58" r="2" fill="#e8d48a" opacity="0.45"/>
    </g>

    <!-- Orbiting particle -->
    <circle cx="0" cy="-148" r="3.5" fill="#e8d48a" opacity="0.75" filter="url(#isoft)"/>
    <circle cx="8" cy="-147" r="1.5" fill="#e8d48a" opacity="0.3"/>
  </g>

  <!-- Brand text below symbol -->
  <text x="512" y="720" text-anchor="middle" font-family="'Cormorant Garamond', 'Garamond', 'Georgia', serif" font-size="48" font-weight="300" letter-spacing="14" fill="#c9a84c" opacity="0.9">SAMSARA</text>
</svg>
