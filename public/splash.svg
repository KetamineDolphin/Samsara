<svg xmlns="http://www.w3.org/2000/svg" width="2732" height="2732" viewBox="0 0 2732 2732">
  <defs>
    <linearGradient id="bodyG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#e8d48a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="headG" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8d48a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="helixG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#e8d48a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.25"/>
    </linearGradient>
    <radialGradient id="ambientG" cx="50%" cy="46%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#c9a84c" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="2732" height="2732" fill="#08090b"/>

  <!-- Subtle ambient glow behind symbol -->
  <circle cx="1366" cy="1240" r="500" fill="url(#ambientG)"/>

  <!-- ═══ SYMBOL GROUP (centered, scaled up to ~320px) ═══ -->
  <g transform="translate(1366, 1240) scale(0.8)">
    <!-- Outer measurement ring -->
    <circle cx="0" cy="0" r="172" fill="none" stroke="rgba(201,168,76,0.06)" stroke-width="0.8" stroke-dasharray="2 6"/>
    <!-- Data dots on outer ring -->
    <circle cx="0" cy="-172" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="56" cy="-162" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="102" cy="-126" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="132" cy="-80" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="144" cy="-26" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="138" cy="30" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="116" cy="80" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="80" cy="120" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="36" cy="146" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="-12" cy="152" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="-60" cy="136" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="-100" cy="104" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="-128" cy="60" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="-140" cy="8" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="-134" cy="-46" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="-112" cy="-94" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="-76" cy="-132" r="1.8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="-34" cy="-156" r="1.8" fill="#c9a84c" opacity="0.3"/>

    <!-- Inner glow -->
    <circle cx="0" cy="0" r="105" fill="url(#ambientG)"/>

    <!-- Ouroboros serpent body -->
    <path
      d="M -15 -128 C 40 -135, 110 -100, 118 -35 C 126 30, 90 110, 20 125 C -50 140, -128 105, -132 35 C -136 -35, -100 -100, -52 -120"
      fill="none" stroke="url(#bodyG)" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="4 0 16 0 32 0 16 0 4"
      filter="url(#glow)"
    />
    <!-- Scale marks -->
    <path
      d="M -15 -128 C 40 -135, 110 -100, 118 -35 C 126 30, 90 110, 20 125 C -50 140, -128 105, -132 35 C -136 -35, -100 -100, -52 -120"
      fill="none" stroke="rgba(201,168,76,0.07)" stroke-width="11"
      stroke-linecap="butt" stroke-dasharray="1 14"
    />
    <!-- Serpent head -->
    <path
      d="M -26 -127 C -23 -136, -16 -142, -8 -139 L -10 -133 L -10 -123 L -8 -117 C -16 -114, -23 -118, -26 -127 Z"
      fill="url(#headG)" filter="url(#glow)"
    />
    <!-- Eye -->
    <circle cx="-16" cy="-131" r="2.8" fill="#e8d48a" opacity="0.9" filter="url(#softGlow)"/>
    <circle cx="-16.5" cy="-131" r="1.1" fill="rgba(15,17,20,0.6)"/>
    <!-- Tail accent -->
    <circle cx="-52" cy="-120" r="1.5" fill="#c9a84c" opacity="0.3"/>

    <!-- DNA Double Helix -->
    <g filter="url(#softGlow)">
      <!-- Strand A -->
      <path
        d="M 22 -82 C 22 -54, -22 -54, -22 -26 S 22 2, 22 30 S -22 58, -22 86"
        stroke="url(#helixG)" stroke-width="2" stroke-linecap="round" fill="none"
      />
      <!-- Strand B -->
      <path
        d="M -22 -82 C -22 -54, 22 -54, 22 -26 S -22 2, -22 30 S 22 58, 22 86"
        stroke="url(#helixG)" stroke-width="2" stroke-linecap="round" fill="none"
      />
      <!-- Base pair rungs -->
      <line x1="-8" y1="-68" x2="8" y2="-68" stroke="#c9a84c" stroke-width="1" opacity="0.2"/>
      <line x1="-20" y1="-40" x2="20" y2="-40" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
      <line x1="-20" y1="44" x2="20" y2="44" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
      <line x1="-8" y1="72" x2="8" y2="72" stroke="#c9a84c" stroke-width="1" opacity="0.2"/>
      <!-- Base pair dots -->
      <circle cx="-8" cy="-68" r="1.5" fill="#c9a84c" opacity="0.25"/>
      <circle cx="8" cy="-68" r="1.5" fill="#c9a84c" opacity="0.25"/>
      <circle cx="-20" cy="-40" r="1.8" fill="#c9a84c" opacity="0.35"/>
      <circle cx="20" cy="-40" r="1.8" fill="#c9a84c" opacity="0.35"/>
      <circle cx="20" cy="44" r="1.8" fill="#c9a84c" opacity="0.35"/>
      <circle cx="-20" cy="44" r="1.8" fill="#c9a84c" opacity="0.35"/>
      <circle cx="8" cy="72" r="1.5" fill="#c9a84c" opacity="0.25"/>
      <circle cx="-8" cy="72" r="1.5" fill="#c9a84c" opacity="0.25"/>
      <!-- Crossing accents -->
      <circle cx="0" cy="-54" r="1.5" fill="#e8d48a" opacity="0.4"/>
      <circle cx="0" cy="2" r="1.5" fill="#e8d48a" opacity="0.4"/>
      <circle cx="0" cy="58" r="1.5" fill="#e8d48a" opacity="0.4"/>
    </g>

    <!-- Orbiting particle -->
    <circle cx="0" cy="-144" r="3" fill="#e8d48a" opacity="0.7" filter="url(#softGlow)"/>
    <circle cx="7" cy="-143" r="1.2" fill="#e8d48a" opacity="0.3"/>
  </g>

  <!-- ═══ BRAND NAME ═══ -->
  <text x="1366" y="1500" text-anchor="middle" font-family="'Cormorant Garamond', 'Garamond', 'Georgia', serif" font-size="64" font-weight="300" letter-spacing="18" fill="#c9a84c" filter="url(#textGlow)">SAMSARA</text>

  <!-- Tagline -->
  <text x="1366" y="1545" text-anchor="middle" font-family="'DM Mono', 'SF Mono', monospace" font-size="16" letter-spacing="5" fill="rgba(240,236,228,0.2)">PEPTIDE PROTOCOL MANAGER</text>
</svg>
